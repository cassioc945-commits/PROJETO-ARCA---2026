<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="../../src/style.css">
</head>
<body>
    <header class="container-nav">
        <nav class="navegacao">
            <ul class="menu-lista">
                <li class="menu-item-container">
                    <button class="dropdown-trigger">
                        <img src="../../public/icones-images/menu.png" alt="menu-arca" class="icone-topo">
                    </button>
                    <div class="dropdown-menu">
                        <ul class="dropdown-links">
                            <li><a href="../../index.html">🏠︎ Menu</a></li>
                            <li><a href="../../pages/adocao/index.html">🐾 Adotar</a></li>
                            <li><a href="../../pages/castracao/index.html">🛠️ Castração</a></li>
                            <li><a href="../../pages/denuncia/index.html">🚨 Fazer Denúncia</a></li>
                            <li><a href="../../pages/pedido_resgate/index.html">🚨 Acionar Resgate</a></li>
                            <li><a href="#ajuda">📱 Ouvidoria</a></li>
                        </ul>
                    </div>
                </li>
                <li class="barra-pesquisa">
                    <input class="search" type="search" placeholder="🔎︎ Pesquisar">
                </li>
                <li class="bloco-direita-container">
                    <ul class="menu-lista-02">
                        <li><img src="../../public/icones-images/acessibilidade.png" alt="acessibilidade"
                                class="ajuste-icon"></li>
                        <li class="menu-item-container">
                            <button class="dropdown-trigger">
                                <img src="../../public/icones-images/perfil.png" alt="perfil" class="ajuste-icon">
                            </button>
                            <div class="dropdown-menu">
                                <div id="conteudo-perfil">
                                    <ul class="dropdown-links">
                                        <li><a href="#" id="btn-entrar">🔑 Entrar / Login</a></li>
                                        <li><a href="#">📝 Criar uma Conta</a></li>
                                    </ul>
                                </div>
                            </div>
                        </li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <main class="registrar">

        <section class="rescue-main-container">

            <h1 class="rescue-title">
                Formulário de Interesse
            </h1>

            <div class="rescue-form-box">

                <div class="rescue-badge-container">
                    <h3>Solicitação de Adoção</h3>
                </div>

                <form>

                    <div class="form-group">
                        <label class="rescue-label">
                            Nome Completo
                        </label>

                        <input type="text" class="rescue-input" placeholder="Digite seu nome">
                    </div>

                    <div class="form-group">
                        <label class="rescue-label">
                            CPF
                        </label>

                        <input type="text" class="rescue-input" placeholder="000.000.000-00">
                    </div>

                    <div class="form-group">
                        <label class="rescue-label">
                            Telefone
                        </label>

                        <input type="tel" class="rescue-input" placeholder="(27) 99999-9999">
                    </div>

                    <div class="form-group">
                        <label class="rescue-label">
                            Animal
                        </label>

                        <select class="rescue-input">

                            <option>
                                Thor
                            </option>

                            <option>
                                Bidu
                            </option>

                            <option>
                                Luna
                            </option>

                        </select>
                    </div>

                    <div class="form-group-block">

                        <label class="rescue-label">
                            Possui residência própria?
                        </label>

                        <label>
                            <input type="radio" name="residencia">

                            Sim
                        </label>

                        <label>
                            <input type="radio" name="residencia">

                            Não
                        </label>

                    </div>

                    <div class="form-group-block">

                        <label class="rescue-label">
                            Possui outros animais?
                        </label>

                        <textarea class="rescue-textarea" placeholder="Descreva brevemente seus animais...">
                    </textarea>

                    </div>

                    <div class="form-footer">

                        <button type="submit" class="btn-enviar">

                            Enviar Solicitação

                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script src="../../src/script.js"></script>
</body>
</html>
