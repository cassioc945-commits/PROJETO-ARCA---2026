<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCA • Check</title>
    <link rel="stylesheet" href="../../src/style.css">
</head>

<body data-page="castracao">

    <header class="container-nav">
        <nav class="navegacao">
            <ul class="menu-lista">
                <li class="menu-item-container">
                    <button class="dropdown-trigger">
                        <img src="../../public/icones-images/menu.png" alt="menu-arca" class="icone-topo">
                    </button>
                    <div class="dropdown-menu">
                        <ul class="dropdown-links">
                            <li><a href="../../index.html">🏠︎ Menu</a></li>
                            <li><a href="../../pages/adocao/index.html">🐾 Adotar</a></li>
                            <li><a href="../../pages/castracao/index.html">🛠️ Castração</a></li>
                            <li><a href="../../pages/denuncia/index.html">🚨 Fazer Denúncia</a></li>
                            <li><a href="../../pages/pedido_resgate/index.html">🚨 Acionar Resgate</a></li>
                            <li><a href="#ajuda">📱 Ouvidoria</a></li>
                        </ul>
                    </div>
                </li>
                <li class="barra-pesquisa">
                    <input class="search" type="search" placeholder="🔎︎ Pesquisar">
                </li>
                <li class="bloco-direita-container">
                    <ul class="menu-lista-02">
                        <li><img src="../../public/icones-images/acessibilidade.png" alt="acessibilidade"
                                class="ajuste-icon"></li>
                        <li class="menu-item-container">
                            <button class="dropdown-trigger">
                                <img src="../../public/icones-images/perfil.png" alt="perfil" class="ajuste-icon">
                            </button>
                            <div class="dropdown-menu">
                                <div id="conteudo-perfil">
                                    <ul class="dropdown-links">
                                        <li><a href="#" id="btn-entrar">🔑 Entrar / Login</a></li>
                                        <li><a href="#">📝 Criar uma Conta</a></li>
                                    </ul>
                                </div>
                            </div>
                        </li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <main class="rescue-main-container registrar">

        <main class="timeline-main-container">

            <section class="contair-checkblocks">
                <article class="check-blocks">
                    <p>Pedido Recebido</p>
                    <div class="img-check"><img src="../../public/icones-images/confirmado.png" alt="icone#"></div>
                </article>

                <div class="loading-dots">
                    <span></span><span></span><span></span><span></span>
                </div>


                <article class="check-blocks">
                    <p>Avaliação Cadastral</p>
                    <div class="img-check"><img src="../../public/icones-images/confirmado.png" alt="icone#"></div>
                </article>

                <div class="loading-dots">
                    <span></span><span></span><span></span><span></span>
                </div>


                <article class="check-blocks">
                    <p>Preparação do Animal</p>
                    <div class="img-check"><img src="../../public/icones-images/confirmado.png" alt="icone#"></div>
                </article>

                <article class="check-blocks">
                    <p>Busca do Animal</p>
                    <div class="img-check"><img src="../../public/icones-images/lupa-animal.png" alt="icone#"></div>
                </article>

                <div class="loading-dots">
                    <span></span><span></span><span></span><span></span>
                </div>

                <article class="check-blocks">
                    <p>Processo finalizado</p>
                    <div class="img-check"><img src="../../public/icones-images/rgb-confirmado.png" alt="icone#"></div>
                </article>
            </section>

            <div class="check-button">
                <button onclick="window.location.href='../adocao/status.html?action=sorteio'"
                    class="btn-filtro btn-green">
                    Verificar Aprovação
                </button>
            </div>
        </main>

        <section>
            <div id="modal-auth" class="modal-overlay">
                <div class="modal-content auth-box">
                    <button id="btn-fechar-auth" class="auth-close">&times;</button>

                    <div class="auth-tabs">
                        <button id="tab-login" class="auth-tab active">Entrar</button>
                        <button id="tab-cadastro" class="auth-tab">Criar Conta</button>
                    </div>

                    <form id="form-autenticacao">
                        <div class="form-group-block">
                            <label class="rescue-label" id="label-usuario" for="auth-email">Usuário / Perfil</label>
                            <input type="text" id="auth-email" class="rescue-input"
                                placeholder="Ex: tutor, candidato, ong..." required autocomplete="off">
                        </div>

                        <div class="form-group-block">
                            <label class="rescue-label" for="auth-senha">Senha</label>
                            <input type="password" id="auth-senha" class="rescue-input" placeholder="Sua senha"
                                required>
                        </div>

                        <button type="submit" id="btn-auth-principal" class="btn-enviar auth-submit-btn">Entrar</button>
                    </form>

                    <div class="auth-divider">
                        <span>ou continue com</span>
                    </div>

                    <div class="auth-social-group">
                        <button id="btn-login-google" type="button" class="btn-social google">
                            <img src="../../public/icones-images/google.png" alt="Google">
                            Entrar com o Google
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <script src="../../src/script.js"></script>
</body>

</html>
